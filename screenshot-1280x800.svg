<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bgGradient)"/>
  
  <!-- Extension popup window -->
  <rect x="100" y="50" width="1080" height="700" fill="#ffffff" rx="12" 
        filter="drop-shadow(0 20px 40px rgba(0,0,0,0.1))"/>
  
  <!-- Header -->
  <rect x="100" y="50" width="1080" height="100" fill="linear-gradient(135deg, #0b5cab 0%, #0a4a8f 100%)" rx="12 12 0 0"/>
  <text x="140" y="115" font-size="48" font-weight="bold" fill="#ffffff" font-family="Arial, sans-serif">Apex Coverage</text>
  
  <!-- Configuration section -->
  <g transform="translate(140, 180)">
    <text x="0" y="0" font-size="20" font-weight="bold" fill="#0f172a" font-family="Arial, sans-serif">Configuration</text>
    
    <!-- Toggle buttons -->
    <rect x="0" y="30" width="300" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2" rx="8"/>
    <text x="20" y="62" font-size="14" font-weight="600" fill="#374151" font-family="Arial, sans-serif">Method-wise view</text>
    <rect x="260" y="38" width="32" height="34" rx="17" fill="rgba(203,213,225,0.4)"/>
    <circle cx="269" cy="55" r="10" fill="#cbd5e1"/>
    
    <rect x="0" y="100" width="300" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2" rx="8"/>
    <text x="20" y="132" font-size="14" font-weight="600" fill="#374151" font-family="Arial, sans-serif">Exclude package classes</text>
    <rect x="260" y="108" width="32" height="34" rx="17" fill="#10b981"/>
    <circle cx="283" cy="125" r="10" fill="#ffffff"/>
  </g>
  
  <!-- Buttons section -->
  <g transform="translate(140, 310)">
    <rect x="0" y="0" width="200" height="45" fill="linear-gradient(135deg, #0b5cab 0%, #0a4a8f 100%)" 
          stroke="rgba(255,255,255,0.1)" stroke-width="1" rx="8"/>
    <text x="50" y="28" font-size="14" font-weight="600" fill="#ffffff" font-family="Arial, sans-serif" text-anchor="middle">Load Coverage</text>
    
    <rect x="220" y="0" width="200" height="45" fill="linear-gradient(135deg, #e0e7ff 0%, #dde7f8 100%)" 
          stroke="#d6deef" stroke-width="1" rx="8" opacity="0.5"/>
    <text x="320" y="28" font-size="14" font-weight="600" fill="#5a6f7d" font-family="Arial, sans-serif" text-anchor="middle">Execute Tests</text>
    
    <rect x="440" y="0" width="200" height="45" fill="linear-gradient(135deg, #e0e7ff 0%, #dde7f8 100%)" 
          stroke="#d6deef" stroke-width="1" rx="8" opacity="0.5"/>
    <text x="540" y="28" font-size="14" font-weight="600" fill="#5a6f7d" font-family="Arial, sans-serif" text-anchor="middle">Export CSV</text>
  </g>
  
  <!-- Status message -->
  <g transform="translate(140, 380)">
    <rect x="0" y="0" width="800" height="45" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2" rx="6"/>
    <text x="20" y="28" font-size="13" fill="#0c5460" font-family="Arial, sans-serif">✓ Session imported from active Salesforce tab</text>
  </g>
  
  <!-- Summary section -->
  <g transform="translate(140, 450)">
    <text x="0" y="0" font-size="16" font-weight="bold" fill="#0f172a" font-family="Arial, sans-serif">Coverage Summary</text>
    
    <rect x="0" y="20" width="600" height="60" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="8" 
          filter="drop-shadow(0 2px 8px rgba(0,0,0,0.08))"/>
    
    <g transform="translate(30, 35)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#64748b" text-transform="uppercase" font-family="Arial, sans-serif">Classes:</text>
      <text x="0" y="18" font-size="18" font-weight="700" fill="#0f172a" font-family="Arial, sans-serif">324</text>
      
      <text x="130" y="0" font-size="11" font-weight="700" fill="#64748b" text-transform="uppercase" font-family="Arial, sans-serif">Covered Lines:</text>
      <text x="130" y="18" font-size="18" font-weight="700" fill="#059669" font-family="Arial, sans-serif">8,420</text>
      
      <text x="350" y="0" font-size="11" font-weight="700" fill="#64748b" text-transform="uppercase" font-family="Arial, sans-serif">Overall Coverage:</text>
      <text x="350" y="18" font-size="18" font-weight="700" fill="#059669" font-family="Arial, sans-serif">74.25%</text>
    </g>
  </g>
  
  <!-- Table header -->
  <g transform="translate(140, 540)">
    <text x="0" y="0" font-size="16" font-weight="bold" fill="#0f172a" font-family="Arial, sans-serif">Class Coverage Details</text>
    
    <!-- Search bar -->
    <rect x="0" y="20" width="800" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="8"/>
    <text x="15" y="48" font-size="13" fill="#9ca3af" font-family="Arial, sans-serif">Filter classes...</text>
    
    <!-- Table -->
    <rect x="0" y="70" width="800" height="35" fill="linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%)" stroke="#d1d5db" stroke-width="1" stroke-width="2"/>
    
    <text x="15" y="98" font-size="12" font-weight="700" fill="#374151" text-transform="uppercase" font-family="Arial, sans-serif">Class Name</text>
    <text x="250" y="98" font-size="12" font-weight="700" fill="#374151" text-transform="uppercase" font-family="Arial, sans-serif">Covered</text>
    <text x="380" y="98" font-size="12" font-weight="700" fill="#374151" text-transform="uppercase" font-family="Arial, sans-serif">Uncovered</text>
    <text x="530" y="98" font-size="12" font-weight="700" fill="#374151" text-transform="uppercase" font-family="Arial, sans-serif">Coverage %</text>
    
    <!-- Data rows -->
    <rect x="0" y="110" width="800" height="35" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="15" y="138" font-size="12" fill="#1f2937" font-family="Arial, monospace">AccountService</text>
    <text x="250" y="138" font-size="12" fill="#1f2937" font-family="Arial, monospace">125</text>
    <text x="380" y="138" font-size="12" fill="#1f2937" font-family="Arial, monospace">34</text>
    <rect x="530" y="118" width="60" height="20" fill="#d1fae5" rx="4"/>
    <text x="560" y="133" font-size="12" font-weight="700" fill="#059669" text-anchor="middle" font-family="Arial, sans-serif">78.62%</text>
    
    <rect x="0" y="150" width="800" height="35" fill="linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%)"/>
    <text x="15" y="178" font-size="12" fill="#1f2937" font-family="Arial, monospace">LeadController</text>
    <text x="250" y="178" font-size="12" fill="#1f2937" font-family="Arial, monospace">256</text>
    <text x="380" y="178" font-size="12" fill="#1f2937" font-family="Arial, monospace">18</text>
    <rect x="530" y="158" width="60" height="20" fill="#d1fae5" rx="4"/>
    <text x="560" y="173" font-size="12" font-weight="700" fill="#059669" text-anchor="middle" font-family="Arial, sans-serif">93.43%</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(0, 760)">
    <rect x="0" y="0" width="1280" height="40" fill="linear-gradient(135deg, #1f2937 0%, #111827 100%)" stroke="rgba(255,255,255,0.1)" stroke-width-top="1"/>
    <text x="240" y="24" font-size="11" fill="#d1d5db" font-family="Arial, sans-serif">Apex Coverage Viewer • Developed by</text>
    <text x="555" y="24" font-size="11" fill="#f3f4f6" font-weight="600" font-family="Arial, sans-serif">Baibahv Kumar</text>
    <text x="715" y="24" font-size="11" fill="#d1d5db" font-family="Arial, sans-serif">• v1.0.0</text>
  </g>
</svg>
