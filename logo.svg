<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="#1e40af"/>
  
  <!-- Code brackets on left side -->
  <path d="M 30 45 L 38 55 L 30 65" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 98 45 L 90 55 L 98 65" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Coverage meter (circular progress indicator) -->
  <circle cx="64" cy="70" r="28" fill="none" stroke="#e0e7ff" stroke-width="4"/>
  <circle cx="64" cy="70" r="28" fill="none" stroke="#10b981" stroke-width="4" 
          stroke-dasharray="131.95" stroke-dashoffset="30" stroke-linecap="round" 
          transform="rotate(-90 64 70)"/>
  
  <!-- Checkmark in center -->
  <path d="M 55 70 L 62 77 L 75 60" stroke="#10b981" stroke-width="4" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Percentage symbol accent -->
  <text x="64" y="105" font-size="10" font-weight="bold" fill="#10b981" text-anchor="middle">100%</text>
</svg>
