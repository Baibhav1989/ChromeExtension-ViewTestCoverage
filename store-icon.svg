<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="100"/>
  
  <!-- Outer circle border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>
  
  <!-- Code brackets - left -->
  <path d="M 130 200 L 180 260 L 130 320" stroke="#ffffff" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code brackets - right -->
  <path d="M 382 200 L 332 260 L 382 320" stroke="#ffffff" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Large circular progress indicator -->
  <circle cx="256" cy="280" r="110" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="16"/>
  <circle cx="256" cy="280" r="110" fill="none" stroke="url(#accentGradient)" stroke-width="16" 
          stroke-dasharray="518.36" stroke-dashoffset="120" stroke-linecap="round" 
          transform="rotate(-90 256 280)"/>
  
  <!-- Large checkmark in the circle -->
  <path d="M 210 280 L 245 320 L 320 220" stroke="url(#accentGradient)" stroke-width="20" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Percentage indicator at bottom -->
  <text x="256" y="420" font-size="56" font-weight="bold" fill="#10b981" text-anchor="middle" font-family="Arial, sans-serif">100%</text>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="412" cy="100" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="100" cy="412" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="412" cy="412" r="12" fill="rgba(255,255,255,0.15)"/>
</svg>
