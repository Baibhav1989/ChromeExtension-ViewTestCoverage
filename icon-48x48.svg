<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#1e40af"/>
  
  <!-- Code brackets on left side -->
  <path d="M 12 17 L 16 22 L 12 27" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 36 17 L 32 22 L 36 27" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Coverage meter (circular progress indicator) -->
  <circle cx="24" cy="24" r="10" fill="none" stroke="#e0e7ff" stroke-width="2.5"/>
  <circle cx="24" cy="24" r="10" fill="none" stroke="#10b981" stroke-width="2.5" 
          stroke-dasharray="47.1" stroke-dashoffset="10.7" stroke-linecap="round" 
          transform="rotate(-90 24 24)"/>
  
  <!-- Checkmark in center -->
  <path d="M 18 24 L 21.5 27.5 L 30 18" stroke="#10b981" stroke-width="2.5" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
