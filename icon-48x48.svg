<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bgGrad48" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad48" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="48" height="48" fill="transparent"/>
  
  <!-- Main artwork area -->
  <g transform="translate(6, 6)">
    <!-- Background circle -->
    <circle cx="18" cy="18" r="18" fill="url(#bgGrad48)"/>
    
    <!-- Code bracket - left -->
    <path d="M 7 10 L 13 18 L 7 26" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Code bracket - right -->
    <path d="M 29 10 L 23 18 L 29 26" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Progress indicator circle -->
    <circle cx="18" cy="18" r="10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <circle cx="18" cy="18" r="10" fill="none" stroke="url(#accentGrad48)" stroke-width="2" 
            stroke-dasharray="49.24" stroke-dashoffset="11" stroke-linecap="round" 
            transform="rotate(-90 18 18)"/>
    
    <!-- Checkmark -->
    <path d="M 14 18 L 16 20 L 22 14" stroke="url(#accentGrad48)" stroke-width="2" fill="none" 
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
