<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Class Coverage Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Apex Coverage</h1>

      <form id="config-form" class="config-form">
        <input
          id="instance-url"
          name="instanceUrl"
          type="url"
          placeholder="https://your-domain.my.salesforce.com"
          readonly
          style="display: none;"
        />

        <input
          id="access-token"
          name="accessToken"
          type="password"
          placeholder="00D..."
          readonly
          style="display: none;"
        />

        <input
          id="api-version"
          name="apiVersion"
          type="text"
          value="60.0"
          pattern="^[0-9]+\\.[0-9]+$"
          readonly
          style="display: none;"
        />

        <div class="toggle-view">
          <label for="include-method-details">Method-wise view</label>
          <button id="include-method-details" name="includeMethodDetails" type="button" class="toggle-btn" aria-pressed="false">
            <span class="toggle-slider"></span>
          </button>
        </div>

        <div class="toggle-view">
          <label for="exclude-packages">Exclude package classes</label>
          <button id="exclude-packages" name="excludePackages" type="button" class="toggle-btn" aria-pressed="true">
            <span class="toggle-slider"></span>
          </button>
        </div>

        <div class="actions">
          <button id="session-button" type="button" class="secondary hidden">
            Use Logged-in Tab Session
          </button>
          <button id="load-button" type="submit">Load Coverage</button>
          <button id="execute-tests-button" type="button" class="secondary hidden">
            Execute Test Classes
          </button>
          <button id="export-button" type="button" class="secondary hidden">
            Export CSV
          </button>
        </div>
      </form>

      <p id="status" class="status"></p>

      <section id="summary" class="summary hidden"></section>

      <label for="search" class="hidden" id="search-label">Filter Classes</label>
      <input
        id="search"
        class="hidden"
        type="text"
        placeholder="Type class name..."
      />

      <div id="table-wrapper" class="table-wrapper hidden">
        <table>
          <thead>
            <tr>
              <th>Class Name</th>
              <th>Namespace</th>
              <th>Covered</th>
              <th>Uncovered</th>
              <th>Coverage %</th>
            </tr>
          </thead>
          <tbody id="coverage-body"></tbody>
        </table>
      </div>

      <section id="method-details" class="method-details hidden">
        <h2 id="method-details-title">Method Coverage</h2>
        <p id="method-details-help" class="muted">
          Enable method-wise view and click any class row to see test mapping.
        </p>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Method</th>
                <th>Covered By Test Methods</th>
              </tr>
            </thead>
            <tbody id="method-details-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Test Classes Modal -->
    <div id="test-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Execute Test Classes</h2>
          <button id="modal-close" type="button" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="test-classes-list" class="test-classes-list"></div>
        </div>
        <div class="modal-footer">
          <button id="select-all-btn" type="button" class="secondary">Select All</button>
          <button id="deselect-all-btn" type="button" class="secondary">Deselect All</button>
          <button id="execute-btn" type="button">Execute Selected</button>
          <button id="modal-cancel" type="button" class="secondary">Cancel</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
