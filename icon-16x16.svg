  <circle cx="8" cy="8" r="8" fill="#1e40af"/>
  
  <!-- Code brackets -->
  <path d="M 3.5 5.5 L 4.5 6.5 L 3.5 7.5" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 12.5 5.5 L 11.5 6.5 L 12.5 7.5" stroke="#ffffff" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Coverage meter -->
