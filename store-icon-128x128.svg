<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Transparent background (16px padding, 96x96 artwork) -->
  <rect width="128" height="128" fill="transparent"/>
  
  <!-- Main artwork area (96x96, centered with 16px padding) -->
  <g transform="translate(16, 16)">
    <!-- Background circle with subtle glow for dark backgrounds -->
    <circle cx="48" cy="48" r="48" fill="url(#bgGrad)" filter="url(#glow)"/>
    
    <!-- Code bracket - left -->
    <path d="M 20 28 L 35 48 L 20 68" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Code bracket - right -->
    <path d="M 76 28 L 61 48 L 76 68" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Progress indicator circle -->
    <circle cx="48" cy="48" r="28" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="5"/>
    <circle cx="48" cy="48" r="28" fill="none" stroke="url(#accentGrad)" stroke-width="5" 
            stroke-dasharray="131.95" stroke-dashoffset="30" stroke-linecap="round" 
            transform="rotate(-90 48 48)"/>
    
    <!-- Checkmark -->
    <path d="M 38 48 L 43 54 L 58 38" stroke="url(#accentGrad)" stroke-width="5" fill="none" 
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
