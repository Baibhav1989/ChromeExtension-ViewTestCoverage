<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="marqueeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f3a7d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="marqueeAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1400" height="560" fill="url(#marqueeGrad1)"/>
  
  <!-- Left section - Large icon -->
  <g transform="translate(100, 80)">
    <circle cx="140" cy="140" r="140" fill="rgba(255,255,255,0.08)"/>
    
    <!-- Large code brackets -->
    <path d="M 70 80 L 110 140 L 70 200" stroke="#ffffff" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 210 80 L 170 140 L 210 200" stroke="#ffffff" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Large progress indicator -->
    <circle cx="140" cy="140" r="90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="16"/>
    <circle cx="140" cy="140" r="90" fill="none" stroke="url(#marqueeAccent)" stroke-width="16" 
            stroke-dasharray="424.12" stroke-dashoffset="95" stroke-linecap="round" 
            transform="rotate(-90 140 140)"/>
    
    <!-- Large checkmark -->
    <path d="M 105 140 L 130 165 L 175 110" stroke="url(#marqueeAccent)" stroke-width="16" fill="none" 
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Center section - Feature breakdown -->
  <g transform="translate(450, 100)">
    <text x="0" y="50" font-size="48" font-weight="bold" fill="#ffffff" font-family="Arial, sans-serif">Apex Coverage</text>
    <text x="0" y="110" font-size="48" font-weight="bold" fill="#10b981" font-family="Arial, sans-serif">Viewer</text>
    
    <!-- Feature list -->
    <g transform="translate(0, 160)">
      <!-- Feature 1 -->
      <circle cx="0" cy="15" r="10" fill="#10b981"/>
      <text x="30" y="22" font-size="22" fill="#ffffff" font-family="Arial, sans-serif">Real-time Coverage Analysis</text>
      
      <!-- Feature 2 -->
      <circle cx="0" cy="80" r="10" fill="#10b981"/>
      <text x="30" y="87" font-size="22" fill="#ffffff" font-family="Arial, sans-serif">Test Method Mapping</text>
      
      <!-- Feature 3 -->
      <circle cx="0" cy="145" r="10" fill="#10b981"/>
      <text x="30" y="152" font-size="22" fill="#ffffff" font-family="Arial, sans-serif">CSV Export for coverage reports</text>

      <!-- Feature 4 -->
      <circle cx="0" cy="210" r="10" fill="#10b981"/>
      <text x="30" y="217" font-size="22" fill="#ffffff" font-family="Arial, sans-serif">Live Test Execution Tracking</text>
    </g>
  </g>
  
  <!-- Right section - Performance metrics -->
  <g transform="translate(950, 120)">
    <rect x="0" y="0" width="380" height="100" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(16, 185, 129, 0.3)" stroke-width="2"/>
    <text x="20" y="35" font-size="28" font-weight="bold" fill="#10b981" font-family="Arial, sans-serif">100%</text>
    <text x="20" y="65" font-size="18" fill="#ffffff" font-family="Arial, sans-serif">Coverage Visibility</text>
    
    <rect x="0" y="130" width="380" height="100" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(16, 185, 129, 0.3)" stroke-width="2"/>
    <text x="20" y="165" font-size="28" font-weight="bold" fill="#10b981" font-family="Arial, sans-serif">2000+</text>
    <text x="20" y="195" font-size="18" fill="#ffffff" font-family="Arial, sans-serif">Classes Analyzed</text>
    
    <rect x="0" y="260" width="380" height="100" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(16, 185, 129, 0.3)" stroke-width="2"/>
    <text x="20" y="295" font-size="28" font-weight="bold" fill="#10b981" font-family="Arial, sans-serif">API v60+</text>
    <text x="20" y="325" font-size="18" fill="#ffffff" font-family="Arial, sans-serif">Salesforce Compatible</text>
  </g>
  
  <!-- Bottom gradient accent -->
  <rect x="0" y="520" width="1400" height="40" fill="url(#marqueeAccent)" opacity="0.2"/>
</svg>
